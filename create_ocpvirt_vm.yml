---
- name: Create KubeVirt VM clone
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
  - redhat.openshift_virtualization.kubevirt_vm:
      state: present
      name: my-vm
      namespace: dap
      run_strategy: Always
      wait: true
      data_volume_templates:
        - metadata:
            name: my-vm-rootdisk
          spec:
            sourceRef:
              kind: DataSource
              name: rhel9
              namespace: openshift-virtualization-os-images
            storage:
              resources:
                requests:
                  storage: 30Gi
      spec:
        template:
          metadata: {}        # ← added before spec
        domain:
          memory:
            guest: 2Gi
          devices:
            disks:
              - name: rootdisk
                disk:
                  bus: virtio
            interfaces:
              - name: default
                masquerade: {}
        networks:
          - name: default
            pod: {}
        volumes:
          - name: rootdisk
            dataVolume:
              name: my-vm-rootdisk
