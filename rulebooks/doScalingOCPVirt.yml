---
- name: Get notification from alertmanager and call autoscaling up or down
  hosts: localhost
  sources:
    - name: Dummy for Alertmanager using curl
      eda.builtin.webhook:
        host: 0.0.0.0
        port: 7000
 ## Define rules with conditions and actions
  rules:
    - name: Call autoscaling up
      # On low performance, scale UP
      condition: event.payload.event_type == "event_lowPerformance"
      action: 
        run_job_template:
          name: reportaMVmanual
          organization: Default
              
